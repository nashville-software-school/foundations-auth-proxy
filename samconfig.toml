version = 0.1

[default.deploy.parameters]
stack_name      = "nss-auth-proxy"
capabilities    = "CAPABILITY_IAM"
resolve_s3      = true
# SitesSecretsB64 is passed at deploy time — never stored here
s3_prefix = "nss-auth-proxy"
profile = "Workshops_Serverless"
confirm_changeset = true
image_repositories = []

[default.global.parameters]
region = "us-east-2"
